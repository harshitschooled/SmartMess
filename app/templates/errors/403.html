{% extends "base.html" %}

{% block title %}SmartMess - Access Denied (403){% endblock %}

{% block content %}
<div class="container text-center py-5 fade-in">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="display-1 text-danger mb-4"><i class="bi bi-shield-lock-fill"></i> 403</div>
            <h2 class="mb-3">Access Forbidden</h2>
            <p class="text-secondary mb-4">You do not have administrative or appropriate permissions to access this page. Backend checks have blocked this action.</p>
            <a href="{{ url_for('home') }}" class="btn btn-primary px-4 btn-lg">
                <i class="bi bi-house-door"></i> Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
