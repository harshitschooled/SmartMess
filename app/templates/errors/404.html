{% extends "base.html" %}

{% block title %}SmartMess - Page Not Found (404){% endblock %}

{% block content %}
<div class="container text-center py-5 fade-in">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="display-1 text-warning mb-4"><i class="bi bi-question-circle-fill"></i> 404</div>
            <h2 class="mb-3">Page Not Found</h2>
            <p class="text-secondary mb-4">The page you are looking for does not exist or has been moved.</p>
            <a href="{{ url_for('home') }}" class="btn btn-primary px-4 btn-lg">
                <i class="bi bi-house-door"></i> Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
