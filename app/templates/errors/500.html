{% extends "base.html" %}

{% block title %}SmartMess - Server Error (500){% endblock %}

{% block content %}
<div class="container text-center py-5 fade-in">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="display-1 text-danger mb-4"><i class="bi bi-bug-fill"></i> 500</div>
            <h2 class="mb-3">Internal Server Error</h2>
            <p class="text-secondary mb-4">Something went wrong on our end. The transaction has been rolled back and our developers are looking into it.</p>
            <a href="{{ url_for('home') }}" class="btn btn-primary px-4 btn-lg">
                <i class="bi bi-house-door"></i> Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
